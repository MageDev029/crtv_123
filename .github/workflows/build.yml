name: build-and-push

# Build the talkhead-miner image on GitHub-hosted runners (full privileges,
# unlike the dev container) and push it to Docker Hub. Triggered manually
# via the Actions tab or automatically on pushes to main.
#
# Required repo secrets:
#   DOCKERHUB_USERNAME  - Docker Hub login
#   DOCKERHUB_TOKEN     - Docker Hub access token (NOT password)
#
# Output:
#   - Image pushed to ${DOCKERHUB_USERNAME}/talkhead-miner:<sha-short> and :latest
#   - Immutable digest printed at the end of the run — copy it into:
#       python -m neurons.miner --image-ref "<user>/talkhead-miner@sha256:..."

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk space
        # Default ubuntu-latest has ~14 GB free; this image needs ~10 GB at
        # peak (CUDA base + PyTorch + weights). Strip the preinstalled junk.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          df -h /

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install insightface for buffalo_l pre-cache
        run: pip install --quiet insightface==0.7.3 onnxruntime

      - name: Download model weights into build context
        run: |
          chmod +x download_weights.sh
          ./download_weights.sh
          du -sh models/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/talkhead-miner:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/talkhead-miner:latest
          # Disable layer cache from registry for the first build to avoid
          # cold-cache surprises; enable later if you want incremental rebuilds.
          provenance: false

      - name: Print submission command
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          IMG="${{ secrets.DOCKERHUB_USERNAME }}/talkhead-miner"
          echo "=================================================="
          echo "Image pushed."
          echo "  Tag:    $IMG:${{ github.sha }}"
          echo "  Digest: $DIGEST"
          echo
          echo "Submit with:"
          echo "  python -m neurons.miner --image-ref \"$IMG@$DIGEST\""
          echo "=================================================="
